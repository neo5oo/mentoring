<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="База знаний по системному анализу">
  <defs>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    .outer-rhombus {
      animation: spin-slow 20s linear infinite;
      transform-origin: 50px 50px;
    }
    .inner-star {
      animation: spin-reverse 12s linear infinite;
      transform-origin: 50px 50px;
    }
    .nodes {
      animation: pulse 2s ease-in-out infinite;
    }
    .nodes:nth-child(1) { animation-delay: 0s; }
    .nodes:nth-child(2) { animation-delay: 0.5s; }
    .nodes:nth-child(3) { animation-delay: 1s; }
    .nodes:nth-child(4) { animation-delay: 1.5s; }
  </style>

  <polygon
    class="outer-rhombus"
    points="50,20 80,50 50,80 20,50"
    fill="none"
    stroke="currentColor"
    stroke-width="3"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <polygon
    class="inner-star"
    points="50,35 65,50 50,65 35,50"
    fill="none"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <circle cx="50" cy="50" r="4" fill="currentColor" opacity="0.9" />
  <circle cx="50" cy="50" r="1.5" fill="#ffffff" opacity="0.8" />

  <circle class="nodes" cx="50" cy="20" r="3.5" fill="currentColor" />
  <circle class="nodes" cx="80" cy="50" r="3.5" fill="currentColor" />
  <circle class="nodes" cx="50" cy="80" r="3.5" fill="currentColor" />
  <circle class="nodes" cx="20" cy="50" r="3.5" fill="currentColor" />

  <circle cx="50" cy="35" r="2.5" fill="currentColor" opacity="0.6" />
  <circle cx="65" cy="50" r="2.5" fill="currentColor" opacity="0.6" />
  <circle cx="50" cy="65" r="2.5" fill="currentColor" opacity="0.6" />
  <circle cx="35" cy="50" r="2.5" fill="currentColor" opacity="0.6" />

  <line x1="50" y1="20" x2="35" y2="35" stroke="currentColor" stroke-width="0.8" opacity="0.3" />
  <line x1="65" y1="35" x2="80" y2="50" stroke="currentColor" stroke-width="0.8" opacity="0.3" />
  <line x1="65" y1="65" x2="80" y2="50" stroke="currentColor" stroke-width="0.8" opacity="0.3" />
  <line x1="50" y1="80" x2="65" y2="65" stroke="currentColor" stroke-width="0.8" opacity="0.3" />
  <line x1="35" y1="65" x2="20" y2="50" stroke="currentColor" stroke-width="0.8" opacity="0.3" />
  <line x1="35" y1="35" x2="20" y2="50" stroke="currentColor" stroke-width="0.8" opacity="0.3" />
</svg>
