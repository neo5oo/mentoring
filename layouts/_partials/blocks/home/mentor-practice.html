<section id="{{ .id }}" class="scroll-mt-24 relative bg-gradient-to-b from-white via-slate-50/90 to-indigo-50/30 py-20 xl:py-28">
  {{ partial "components/tech-cloud-section" (dict "set" "practice") }}
  <div class="pointer-events-none absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
  <div class="container mx-auto max-w-6xl px-4">
    <p class="section-eyebrow">Учебные кейсы</p>
    <h2 class="section-title mx-auto text-center">{{ .title }}</h2>
    <p class="mx-auto mt-6 max-w-3xl text-center text-lg font-semibold leading-relaxed text-slate-800 sm:text-xl">
      {{ .lead }}
    </p>
    <p class="section-subtitle mx-auto mt-4 text-center">{{ .body }}</p>

    <div class="mt-16 grid gap-6 md:grid-cols-2 xl:grid-cols-3">
      {{ range .cards }}
        {{ $chips := .chips | default (slice "Практика") }}
        <article
          class="card-elevated card-elevated-hover group flex h-full flex-col overflow-hidden border-t-[3px] border-t-accent/50"
        >
          <div class="flex flex-wrap gap-2 border-b border-slate-100 bg-slate-50/80 px-5 py-4">
            {{ range $chips }}
              <span
                class="ui-tag rounded-lg px-2.5 py-1 text-[0.7rem] font-bold uppercase"
                >{{ . }}</span
              >
            {{ end }}
          </div>
          <div class="flex flex-1 flex-col p-6">
            <h3 class="mb-3 text-lg font-bold text-slate-900">{{ .title }}</h3>
            <p class="text-[0.95rem] leading-relaxed text-slate-600">{{ .text }}</p>
          </div>
        </article>
      {{ end }}
    </div>
  </div>
</section>
