<section id="{{ .id }}" class="scroll-mt-24 relative overflow-hidden py-24 xl:py-32">
  <div
    class="pointer-events-none absolute inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute -right-20 top-0 h-80 w-80 rounded-full bg-primary/25 blur-3xl"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute -bottom-20 -left-10 h-72 w-72 rounded-full bg-accent/20 blur-3xl"
    aria-hidden="true"
  ></div>
  <div
    class="bg-noise-soft pointer-events-none absolute inset-0 opacity-[0.12] mix-blend-overlay"
    aria-hidden="true"
  ></div>

  <div class="container relative mx-auto max-w-3xl px-4 text-center">
    <p class="mb-4 text-xs font-bold uppercase tracking-[0.25em] text-white/70">Следующий шаг</p>
    <h2 class="text-balance text-3xl font-bold tracking-tight text-white sm:text-4xl xl:text-[2.35rem] xl:leading-tight">
      {{ .title }}
    </h2>
    <p class="mx-auto mt-6 max-w-xl text-lg leading-relaxed text-slate-300">{{ .text }}</p>
    <p class="mx-auto mt-4 max-w-md text-sm text-slate-400">
      Отвечу на вопросы по формату и подскажу, какой маршрут логичнее в твоей ситуации.
    </p>
    {{ with .button }}
      <div class="mt-10 flex justify-center">
        {{ partial "components/button/primary" (dict "label" .label "href" .url) }}
      </div>
    {{ end }}
  </div>
</section>
