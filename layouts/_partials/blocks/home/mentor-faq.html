<section id="{{ .id }}" class="scroll-mt-24 relative border-b border-slate-200/70 bg-gradient-to-b from-white to-slate-50/65 py-20 xl:py-28">
  {{ partial "components/tech-cloud-section" (dict "set" "faq") }}
  <div class="container mx-auto max-w-4xl px-4">
    <p class="section-eyebrow">Вопросы</p>
    <h2 class="section-title mx-auto text-center">{{ .title }}</h2>
    <div class="section-shell mx-auto mt-14 max-w-3xl">
      <div class="space-y-4">
      {{ range .items }}
        <details
          class="details-smooth group rounded-3xl border border-slate-200/90 bg-slate-50/40 shadow-md shadow-slate-900/[0.03] transition-all duration-300 open:border-primary/30 open:bg-white open:shadow-lg open:shadow-primary/8 open:ring-1 open:ring-primary/15"
        >
          <summary
            class="flex cursor-pointer list-none items-start justify-between gap-4 rounded-2xl px-5 py-5 marker:content-none transition-all duration-300 hover:bg-white/85 sm:px-6 [&::-webkit-details-marker]:hidden"
          >
            <span class="text-left text-[0.95rem] font-bold leading-snug text-slate-900 sm:text-base">{{ .q }}</span>
            <span
              class="mt-0.5 flex size-9 shrink-0 items-center justify-center rounded-full border border-slate-200 bg-white text-primary transition-all duration-300 group-open:rotate-180 group-open:border-primary/30 group-open:bg-primary/5"
              aria-hidden="true"
            >
              <i class="fa-solid fa-plus text-xs group-open:hidden"></i>
              <i class="fa-solid fa-minus hidden text-xs group-open:inline"></i>
            </span>
          </summary>
          <div class="details-content">
            <div class="details-content-inner border-t border-slate-100 px-5 pb-6 pt-1 sm:px-6">
              <div class="faq-answer pt-4 text-[0.95rem] leading-relaxed text-slate-600 [&_a]:font-semibold [&_a]:text-primary [&_a]:underline [&_a]:decoration-primary/70 [&_a]:underline-offset-4 hover:[&_a]:decoration-primary">{{ .a | markdownify }}</div>
            </div>
          </div>
        </details>
      {{ end }}
      </div>
    </div>
  </div>
</section>
