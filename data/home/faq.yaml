enable: true
id: faq
title: FAQ
items:
  - q: Подойдет ли, если я с нуля?
    a: >-
      Да. Программа подходит новичкам: мы начинаем с основ, закрепляем знания практикой и упаковываем прошлый опыт в резюме так, чтобы работодатели видели в тебе ценность.
  - q: Подойдет ли, если я уже junior?
    a: >-
      Да. Часто упор делаем на API, интеграции, документацию и типовые рабочие ситуации,
      чтобы увереннее закрывать задачи и готовиться к middle.
  - q: Будет ли практика?
    a: >-
      Да. Это практические задания по типовым рабочим ситуациям системного аналитика:
      требования, контракты, диаграммы, постановки — с ревью и доработкой.
  - q: Это курс или индивидуальное менторство?
    a: >-
      Индивидуальное менторство и консультации. Нет фиксированного «потока для всех»:
      программа и задания завязаны на твою цель и текущий уровень.
  - q: Помогаешь ли с резюме?
    a: >-
      Да, в формате менторства можно разобрать резюме, формулировки и легенду опыта
      так, чтобы это было согласовано с реальными задачами аналитика.
  - q: Есть ли подготовка к собеседованиям?
    a: >-
      Да: технические вопросы, практические кейсы, мок-собеседования и разбор ошибок
      после ответов.
  - q: Сколько длится обучение?
    a: >-
      В среднем 2-3 месяца.
  - q: Что понадобится, чтобы начать обучение?
    a: >-
      Напиши [мне](https://t.me/neo_61) — созвонимся и обсудим детали.
      Из техники понадобится компьютер или ноутбук. Телефон и планшет подойдут только для чтения материалов, учиться на них будет неудобно.
  - q: Есть ли гарантия трудоустройства?
    a: >-
      Гарантию трудоустройства я не даю. На результат влияет уровень ученика, дисциплина,
      рынок и качество подготовки. Моя задача — дать структуру, практику, обратную связь
      и подготовить к рабочим задачам и собеседованиям.
  - q: Что такое "100% от первой зарплаты"?
    a: >-
      Это постоплата за результат. На старте ты вносишь предоплату 30 000 ₽, и мы начинаем обучение. Основная часть оплаты вносится только после того, как ты устроишься на новую работу и получишь первый доход.
      Размер постоплаты рассчитывается от суммы заработной платы, указанной в оффере после вычета НДФЛ, то есть от суммы "на руки" (net).
      Например, если в оффере указана заработная плата 100 000 ₽ на руки, постоплата составит 100 000 ₽. Эту сумму можно разделить на части — например, на 3 месяца.
  - q: Что если не получится?
    a: >-
      Мы работаем до результата. Главное — твоя вовлечённость и желание.