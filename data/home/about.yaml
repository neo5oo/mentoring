enable: true
id: about
title: Обо мне
text:
  paragraphs:
    - >-
      Привет! Я Данил — системный аналитик и ментор. Работал в финтехе, страховании,
      атомной отрасли и документообороте, занимаюсь продуктовыми и интеграционными
      задачами в крупных корпоративных системах.
    - >-
      Прошёл путь от госслужащего до ведущего аналитика. Смог я — сможешь и ты.
    - >-
      В менторстве делаю упор на практику: помогаю разбирать задачи, видеть границы
      решения, задавать нужные вопросы и готовить понятные артефакты для команды.

