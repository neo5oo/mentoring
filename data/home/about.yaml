enable: true
id: about
title: Обо мне
text: >-
  Привет! 
  Я Данил — ведущий системный аналитик и ментор.
  Работал в таким доменах как: финтех, страхование, атомная отрасль и документооборот. Занимаюсь продуктовыми и интеграционными задачами в крупных корпоративных системах.
  В менторстве делаю упор на прикладной подход: помогаю ученикам не просто выучить термины, а научиться разбирать задачу, видеть границы решения, задавать правильные вопросы и готовить понятные артефакты для команды.

