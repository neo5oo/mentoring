enable: true
id: audience
title: Кому подойдет
items:
  - title: Новичкам
    text: >-
      Если хочешь понять профессию системного аналитика, не утонуть в хаотичных статьях
      , собрать нормальную базу и получить первый оффер в IT!
  - title: Junior аналитикам
    text: >-
      Если уже знаешь основы, но плаваешь в API, интеграциях, требованиях и документации. Хочешь вырасти в уверенного middle аналитика и повысить свой доход.
  - title: Начинающим middle
    text: >-
      Если хочешь увереннее разбирать технические задачи, писать системные требования
      и общаться с разработкой.
  - title: QA / support / BA
    text: >-
      Если хочешь перейти в системный анализ и понять, какие навыки нужно добрать.
