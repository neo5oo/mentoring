enable: true
id: program
title: Программа
subtitle: Пройдем от базы до получения оффера. В среднем путь занимает 2-3 месяца в зависимости от уровня, цели и темпа обучения.
tracks:
  - title: База системного анализа
    items:
      - роль системного аналитика
      - жизненный цикл задачи
      - сбор и уточнение требований
      - виды требований
      - Use Case / User Story
      - приоритезация требований
      - постановка задачи разработчику
  - title: Моделирование
    items:
      - BPMN
      - UML (диаграммы последовательности, деятельности, состояний)
      - ER-диаграммы
      - C4
  - title: Базы данных и SQL
    items:
      - проектирование баз данных
      - виды БД (реляционные, нереляционные)
      - таблицы, ключи, связи в БД
      - SQL для аналитика
      - масштабирование БД
      - понимание индексов, транзакций
      - и многое другое
  - title: API и интеграции
    items:
      - REST, gRPC, SOAP, GraphQL, WebSocket, Webhook
      - интеграционные паттерны
      - дизайн API
      - маппинг данных
      - документирование API
      - безопасность API
      - и многое другое
  - title: Брокеры сообщений и очереди
    items:
      - Kafka, RabbitMQ
      - модели доставки сообщений
      - гарантии доставки
      - очереди и топики
      - интеграционные паттерны с брокерами
      - и многое другое
  - title: Архитектура и дизайн
    items:
      - архитектурные стили (монолит, микросервисы, событийно-ориентированная архитектура, serverless)
      - архитектурные паттерны
      - масштабирование
      - отказоустойчивость
      - управление данными в архитектуре
      - и многое другое
  - title: Собеседования
    items:
      - большая база записей собеседований
      - технические вопросы
      - практические кейсы
      - резюме
      - легенда опыта
      - мок-собеседования
      - разбор ошибок
  - title: Адаптация и испытательный срок
    items:
      - как влиться в новую команду
      - первые задачи на проекте
      - как задавать вопросы и не бояться
      - разбор реального кейса с работы
      - поддержка на испытательном сроке
