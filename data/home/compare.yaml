enable: true
id: approach
title: Чем отличается подход
columns:
  - title: Самостоятельно
    items:
      - сложно собрать системный план обучения
      - трудно отделить главное от второстепенного
      - нет регулярной обратной связи по артефактам
      - высокий риск застрять на сложных темах
      - медленный прогресс без внешней структуры
      - легко потерять темп и мотивацию
  - title: Обучение на курсах
    items:
      - дорого (150к+ за обучение)
      - давят кредитами и рассрочкой
      - общая программа на поток
      - обезличенная обратная связь
      - после оплаты — ты сам по себе
      - подготовка к "галочке", а не к реальной работе
  - title: Мой подход
    items:
      - структурированный маршрут
      - обучение от текущего уровня
      - практические артефакты
      - ревью и доработка
      - подготовка к рабочим ситуациям и собеседованиям
      - поддержка до первых результатов на рынке
