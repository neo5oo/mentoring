enable: true
id: practice
title: Практика
lead: >-
  Учебные кейсы, которые максимально похожи на реальные задачи системного аналитика.
body: >-
  Вместо теории ради теории делаем полноценные артефакты под рабочие сценарии: от требований
  и схем до готовых постановок, резюме и легенды для найма. И это только часть практики - в ходе обучения будет еще больше кейсов и задач.
cards:
  - title: Работа с требованиями
    chips: [User Story, AC, Use Case]
    text: Учимся составлять User Story, AC, Use Case. Описываем пользовательские сценарии так, чтобы их одинаково поняли бизнес, фронт, бэк и тестирование.
  - title: REST API и контракты
    chips: [REST, JSON, Пагинация и прочее]
    text: "Проектируем endpoint под задачу: запрос, ответ, статусы, ошибки, валидации, пагинация, фильтры и обратная совместимость."
  - title: Интеграция между системами
    chips: [gRPC, Mapping, Sequence]
    text: "Разбираем, как одна система вызывает другую: какие данные передаем, как маппим поля, что делаем при ошибках и как описываем взаимодействие на схеме."
  - title: Асинхронные интеграции
    chips: [Kafka, Events, Retry]
    text: "Учимся описывать процессы, где система работает не мгновенно: события, статусы, повторная обработка, ошибки и уведомления пользователю."
  - title: Базы данных и SQL
    chips: [SQL, Joins, Aggregation]
    text: "Пишем запросы не ради SQL, а для рабочих задач: проверить гипотезу, найти данные, сверить статусы, подготовить выборку для анализа."
  - title: Проектная документация
    chips: [Confluence, Jira, AC]
    text: "Собираем все артефакты в понятную задачу для команды: контекст, что нужно сделать, ссылки на требования, критерии приемки и открытые вопросы."
  - title: Резюме и легенда
    chips: [CV, Interview]
    text: "Упаковываем опыт под вакансии системного аналитика: сильные кейсы, формулировки и объяснение вклада."
  - title: Мок-собеседование
    chips: [Interview, Feedback, Offer]
    text: Проходим пробное интервью, разбираем ответы и добираем пробелы перед реальными собеседованиями.
