enable: true
title: Обучение системному анализу
text: >-
  Помогаю новичкам, junior и начинающим middle-аналитикам выстроить понятный маршрут:
  база знаний, разборы, практические задания, документация, API, интеграции
  и подготовка к собеседованиям.
buttons:
  - label: Записаться на консультацию
    link: https://t.me/neo_61
    primary: true
  - label: Посмотреть программу
    link: /#program
    primary: false
flow:
  title: Твой путь системного аналитика
  steps:
    - Введение в профессию и роли
    - Работа с требованиями (User Story, Use Case, AC)
    - Моделирование (BPMN, UML, ER-диаграммы)
    - Базы данных и SQL
    - API, интеграции и контракты
    - Архитектура и проектирование
    - Подготовка к собеседованиям
    - Получение оффера
    - Адаптация и испытательный срок
items:
  - title: Структурированный маршрут
    icon: fa-solid fa-diagram-project
    color: "#4338ca"
  - title: Практические задания
    icon: fa-solid fa-code
    color: "#0d9488"
  - title: Ревью артефактов
    icon: fa-solid fa-file-lines
    color: "#0369a1"
  - title: Подготовка к собеседованиям
    icon: fa-solid fa-comments
    color: "#7c3aed"
